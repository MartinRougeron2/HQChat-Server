# HQCAT nginx — behind Cloudflare (Cloudflare terminates the public TLS).
# Place at /etc/nginx/sites-available/hqcat, symlink into sites-enabled.
# Replace YOUR_DOMAIN. No certbot needed — Cloudflare provides the edge cert.
#
# Recommended Cloudflare SSL/TLS mode: "Full (strict)" using a Cloudflare
# Origin Certificate installed on this box (see the 443 block below).
# Simplest alternative: "Flexible" mode → delete the 443 block and let
# Cloudflare talk to this origin over plain HTTP on port 80 (less secure:
# the CF↔origin hop is unencrypted).

# --- Origin over HTTPS (Full / Full-strict) using a Cloudflare Origin Cert ---
server {
    # HTTP/2 on the listen line for compatibility with nginx < 1.25.1.
    # (Newer nginx accepts this too, with a deprecation note.)
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    # Generate in Cloudflare → SSL/TLS → Origin Server → Create Certificate,
    # then save the cert/key to these paths.
    ssl_certificate     /etc/ssl/cloudflare/origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/origin.key;

    location /ws {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        # Real client IP from Cloudflare (see /etc/nginx/cloudflare-realip.conf note in DEPLOY.md).
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Everything else (/health, /stripe/webhook, /subscribe…) → Node, which
    # owns the routing and returns its own 404s.
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
    }
}

# SECURITY: Use Cloudflare "Full (strict)" ONLY. "Flexible" leaves the
# Cloudflare↔origin hop UNENCRYPTED — all WS/control traffic in clear on the
# wire to the VPS. Also restrict the origin to Cloudflare: either firewall :80
# to Cloudflare's published IP ranges (ufw/iptables), or terminate TLS here and
# drop plaintext :80 entirely. Without that, anyone hitting the origin IP
# directly bypasses Cloudflare (and this plaintext :80 server).
server {
    listen 80;
    server_name YOUR_DOMAIN;

    location /ws {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
    location / { proxy_pass http://127.0.0.1:8080; proxy_set_header Host $host; }
}
